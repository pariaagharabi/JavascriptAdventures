<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline form validation in HTML</title>

    <style>
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            width: 300px;
        }
    </style>
</head>

<body>
    <form id="registrationForm">
        <div class="form-group">
            <label for="username">Username (min 4 characters)</label>
            <input type="text" id="username" required minlength="4">
            <span class="error-msg">Username must be at least 4 characters long.</span>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>
            <span class="error-msg">Please enter a valid email address.</span>
        </div>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
