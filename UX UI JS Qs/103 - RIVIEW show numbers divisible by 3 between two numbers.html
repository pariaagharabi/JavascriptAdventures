<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers divisible by 3</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: rgb(4, 16, 34);
            color: rgb(225, 234, 246);
            margin-top: 12px;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 60px;
        }

        .innerContainer {
            border: 2px solid rgb(225, 234, 246);
            border-radius: 8px;
            box-shadow: 0 0 16px;
            margin: 12px;
            padding: 12px;
            text-align: center;
        }

        .mainContainer .inputGroup label::after {
            content: "*";
            color: red;
        }

        .mainContainer .inputGroup input {
            color: rgb(225, 234, 246);
            background-color: transparent;
            outline: none;
            padding: 2px;
            border: 1px solid rgb(225, 234, 246);
            border-radius: 4px;
        }

        .mainContainer .inputGroup input:focus {
            box-shadow: 0 0 4px;
        }

        .mainContainer button {
            color: rgb(225, 234, 246);
            background-color: transparent;
            outline: none;
            border: 2px solid rgb(225, 234, 246);
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Show numbers divisible by 3 between two numbers</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <div class="inputNum1">
                        <label for="num1">Number 1:</label>
                        <input type="number" id="num1" name="num1" placeholder="Number 1 ...">
                    </div>
                    <div class="inputNum2">
                        <label for="num2">Number 2:</label>
                        <input type="number" id="num2" name="num2" placeholder="Number 2 ...">
                    </div>
                </div>
                <button id="btnDivisible">Show Numbers Divisible by 3</button>
            </main>

            <div class="outputContainer">
                <h2>Output:</h2>
                <p id="output"></p>
            </div>
        </div>
    </div>

    <script>
        function showNumsDivisibleBy3(num1, num2) {
            let result = [];

            for (let i = num1; i <= num2; i++) {
                if (i % 3 === 0) {
                    result.push(i);
                }
            }

            return result;
        }

        // Example usage:
        console.log(showNumsDivisibleBy3(1, 20)); // Output: [3, 6, 9, 12, 15, 18]
    </script>

</body>

</html>
