<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers divisible by 3</title>
    <style>

    </style>
</head>
<body>

    <script>
        function showNumsDivisibleBy3(num1, num2){
            let result = [];

            for(let i = num1; i <= num2; i++){
                if(i % 3 === 0){
                    result.push(i);
                }
            }
        }
    </script>
    
</body>
</html>
