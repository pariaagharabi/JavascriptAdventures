<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers divisible by 3</title>
    <style>

    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Show numbers divisible by 3 between two numbers</h1>
            </header>
        </div>
    </div>

    <script>
        function showNumsDivisibleBy3(num1, num2) {
            let result = [];

            for (let i = num1; i <= num2; i++) {
                if (i % 3 === 0) {
                    result.push(i);
                }
            }

            return result;
        }

        // Example usage:
        console.log(showNumsDivisibleBy3(1, 20)); // Output: [3, 6, 9, 12, 15, 18]
    </script>

</body>

</html>
