<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascending String Sort in Array</title>
    <style>

    </style>
</head>

<body>

    <script>
        function sortStrings(arr) {
            return arr.sort();
        }

        // Example usage:
        console.log(sortStrings(["banana", "apple", "cherry"])); // Output: ["apple", "banana", "cherry"]
    </script>

</body>

</html>
