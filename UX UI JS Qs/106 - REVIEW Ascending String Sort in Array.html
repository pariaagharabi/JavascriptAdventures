<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascending String Sort in Array</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            color: rgb(9, 76, 76);
            background-color: rgb(252, 254, 252);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 20px;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 2;
        }

        .innerContainer {
            border: 2px solid rgb(9, 76, 76);
            border-radius: 10px;
            box-shadow: 0 0 10px;
            padding: 20px;
            margin: 20px;
            text-align: center;
        }

        .mainContainer .inputGroup label::after {
            content: "*";
            color: red;
        }

        .mainContainer .inputGroup input {
            border: 2px solid rgb(9, 76, 76);
            border-radius: 4px;
            padding: 2px;
            outline: none;
            color: rgb(9, 76, 76);
            background-color: transparent;
        }

        .mainContainer .inputGroup input:focus {
            box-shadow: 0 0 4px;
        }

        .mainContainer button {
            border: 2px solid rgb(9, 76, 76);
            border-radius: 4px;
            color: rgb(9, 76, 76);
            background-color: transparent;
            cursor: pointer;
            padding: 2px 12px;
            outline: none;
            font-weight: bold;
            trasition: all 0.3s ease-in-out;
        }

        .mainContainer button:hover {
            background-color: rgb(9, 76, 76);
            color: rgb(252, 254, 252);
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Ascending String Sort in Array</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label for="stringArray">Enter strings (comma-separated):</label>
                    <input type="text" id="stringArray" placeholder="e.g., banana, apple, cherry">
                </div>
                <button id="btnSort">Sort Strings</button>
            </main>

            <div class="outputContainer">
                <h2>Sorted Strings:</h2>
                <pre id="output"></pre>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("btnSort").addEventListener("click", () => {
            const input = document.getElementById("stringArray").value;
            const stringArray = input.split(",").map(str => str.trim());
            const sortedArray = sortStrings(stringArray);
            document.getElementById("output").textContent = JSON.stringify(sortedArray, null, 2);
        });


        function sortStrings(arr) {
            return arr.sort();
        }

        // Example usage:
        console.log(sortStrings(["banana", "apple", "cherry"])); // Output: ["apple", "banana", "cherry"]
    </script>

</body>

</html>
