<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty an array</title>
    <style>

    </style>
</head>

<body>

    <script>
        function emptyArray(orgArr) {
            const convertedEmptyArr = orgArr.length = 0;
            return convertedEmptyArr;
        }

        // Example usage:
        console.log(emptyArray([1, 2, 3, 4])); // Output: []
    </script>

</body>

</html>
