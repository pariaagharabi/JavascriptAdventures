<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate a string</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: cursive;
            background-color: #f0f0f0;
            color: rgb(42, 42, 68);
            margin-top: 12px;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 60px;
        }

        .innerContainer {
            text-align: center;
            border: 2px solid rgb(42, 42, 68);
            border-radius: 8px;
            box-shadow: 0 0 12px;
            padding: 12px;
        }

        .mainContainer .inputGroup label::after {
            content: "*";
            color: red;
        }

        .mainContainer .inputGroup input {
            border: 2px solid rgb(42, 42, 68);
            border-radius: 4px;
            padding: 2px;
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Rotate a string</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label for="inputString">Input String:</label>
                    <input type="text" id="inputString" placeholder="Enter a string...">
                </div>
                <button id="rotateBtn">Rotate String</button>
            </main>

            <div class="outputContainer">
                <h2>Output:</h2>
                <p id="outputString"></p>
            </div>
        </div>
    </div>



    <script>
        function rotateString(orgString, num) {
            if (num < 0) {
                num = orgString.length + num;
            }
            return orgString.slice(num) + orgString.slice(0, num);
        }

        // Example usage:
        console.log(rotateString("Hello, World!", 5)); // Output: "World!Hello, "
    </script>

</body>

</html>
