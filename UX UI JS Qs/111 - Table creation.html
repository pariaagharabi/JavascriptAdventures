<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The High-Density Data Table</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: rgb(238, 238, 238);
            color: darkblue;
        }
    </style>
</head>

<body>
    <div class="table-container">
        <table class="data-matrix">

            <thead>
                <tr>
                    <th scope="col" class="sticky-col">Plan Year</th>
                    <th scope="col">Base Salary</th>
                    <th scope="col">Accrual Rate</th>
                    <th scope="col">Credited Service</th>
                    <th scope="col">Proj. Benefit (Monthly)</th>
                    <th scope="col">Proj. Benefit (Annual)</th>
                    <th scope="col">Commuted Value</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th scope="row" class="sticky-col">2026</th>
                    <td>$85,000.00</td>
                    <td>1.5%</td>
                    <td>5.0</td>
                    <td>$531.25</td>
                    <td>$6,375.00</td>
                    <td>$82,450.00</td>
                </tr>
                <tr>
                    <th scope="row" class="sticky-col">2027</th>
                    <td>$87,000.00</td>
                    <td>1.5%</td>
                    <td>6.0</td>
                    <td>$652.50</td>
                    <td>$7,830.00</td>
                    <td>$101,500.00</td>
                </tr>
            </tbody>

        </table>
    </div>

</body>

</html>
