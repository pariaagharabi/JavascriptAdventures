<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Rotation</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            margin-top: 20px;
            color: darkblue;
            background-color: rgb(238, 238, 238);
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 2.5rem;
        }

        .innerContainer {
            text-align: center;
            border: 1px solid darkblue;
            border-radius: 10px;
            box-shadow: 0px 0px 10px;
            padding: 20px;
        }

        .mainContainer .inputGroup label::after {
            content: "*";
            color: red;
        }

        .mainContainer .inputGroup input {
            background-color: transparent;
            color: darkblue;
            border: 1px solid darkblue;
            border-radius: 4px;
            padding: 2px;
            outline: none;
        }

        .mainContainer .inputGroup input:focus {
            box-shadow: 0px 0px 4px;
        }

        .mainContainer button {
            background-color: transparent;
            color: darkblue;
            border: 1px solid darkblue;
            border-radius: 4px;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.5s ease-in-out;
            font-weight: bold;
        }

        .mainContainer button:hover {
            background-color: darkblue;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>String Rotation</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <div class="firstStr">
                        <label for="firstStr">First String:</label>
                        <input type="text" id="firstStr" placeholder="Enter first string">
                    </div>
                    <div class="secondStr">
                        <label for="secondStr">Second String:</label>
                        <input type="text" id="secondStr" placeholder="Enter second string">
                    </div>
                </div>
                <button id="checkRotationBtn">Check Rotation</button>
            </main>

            <div class="outputContainer">
                <p id="result"></p>
            </div>
        </div>
    </div>


    <script>
        document.getElementById("checkRotationBtn").addEventListener("click",()=>{
            const userInput1 = document.getElementById("firstStr").value;
            const userInput2 = document.getElementById("secondStr").value;

            const result = isRotation(userInput1, userInput2);
        });

        function isRotation(str1, str2) {
            if (str1.length !== str2.length) {
                return false;
            }
            const concatenated = str1 + str1;

            return concatenated.includes(str2);
        }

        // Example usage:
        console.log(isRotation("hello", "lohel")); // true
    </script>
</body>

</html>
