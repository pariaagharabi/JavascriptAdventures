<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVIEW - Reverse a number</title>
    <style>

    </style>
</head>

<body>


    <script>
        function reverseNum(orgNum) {
            while (orgNum > 0) {
                return String(orgNum).split("").reverse().join("");
            }

            return orgNum;
        }

        // Test cases
        console.log(reverseNum(1234)); // Output: 4321
        console.log(reverseNum(1000)); // Output: 0001
    </script>

</body>

</html>
