<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Array Plus One</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Sum of Array Plus One</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label for="arrayInput">Enter an array of numbers:</label>
                    <input type="text" id="arrayInput" placeholder="e.g. 1, 2, 3">
                </div>
                <button id="calculateBtn">Calculate</button>
            </main>

            <div class="outputContainer">
                <h2><span id="result">Result:</span></h2>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("calculateBtn").addEventListener("click", () => {
            const userInput = document.getElementById("arrayInput").value;
            const convrtToNums = userInput.split(",").map(item => item.trim());

            document.getElementById("result").textContent = sumPlusOne(convrtToNums);
        })

        function sumPlusOne(orgArr) {
            let sumNums = 0;

            for (let i = 0; i < orgArr.length; i++) {
                orgArr[i] = Number(orgArr[i]);
                sumNums += orgArr[i];
            }
            return sumNums + 1;
        }

        // Example usage:
        console.log(sumPlusOne([1, 2, 3])); // Output: 7

    </script>
</body>

</html>
