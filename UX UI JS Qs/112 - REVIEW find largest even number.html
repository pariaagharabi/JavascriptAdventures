<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find largest even number</title>
    <style>

    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Find largest even number</h1>
            </header>

            <main class="mainContainer">
                <div class="groupInput">
                    <label for="numbers">Enter numbers (comma-separated):</label>
                    <input type="text" id="numbers" placeholder="e.g., 1, 2, 3, 4, 5">
                </div>
                <button id="findButton">Find Largest Even Number</button>
            </main>
        </div>
    </div>

    <script>
        function findLargestEvenNumber(arr) {
            let largestEven = null;
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] % 2 === 0) {
                    if (largestEven === null || arr[i] > largestEven) {
                        largestEven = arr[i];
                    }
                }
            }
            return largestEven;
        }

        // Example usage:
        console.log(findLargestEvenNumber([1, 3, 5, 7])); // Output: null
        console.log(findLargestEvenNumber([1, 2, 3, 4, 5])); // Output: 4
    </script>

</body>

</html>
