<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integers Divider</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            color: rgb(250, 250, 253);
            background-color: rgb(19, 19, 56);
            margin-top: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Integers Divider</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <div class="dividendInput">
                        <label for="dividend">Dividend:</label>
                        <input type="number" id="dividend" placeholder="Enter dividend">
                    </div>
                    <div class="divisorGroup">
                        <div class="inputGroup">
                            <label for="divisor">Divisor:</label>
                            <input type="number" id="divisor" placeholder="Enter divisor">
                        </div>
                    </div>
                    <button id="btnDivider">Divide</button>
                </div>

            </main>
        </div>
    </div>

    <script>
        function integerDivider(dividend, divisor) {
            // Prevent infinite loop if divisor is 1 or -1
            if (divisor === 1) return dividend;
            if (divisor === -1) return -dividend;

            // Division by zero is undefined
            if (divisor === 0) return NaN;

            let current = dividend;

            // Keep dividing as long as 'current' is perfectly divisible by 'divisor'
            while (current % divisor === 0 && current !== 0) {
                current = current / divisor;
            }

            return current;
        }

        // Example usage:
        console.log(integerDivider(100, 1)); // Output: 100
        console.log(integerDivider(100, -1)); // Output: -100
        console.log(integerDivider(100, 0)); // Output: NaN
        console.log(integerDivider(100, 2)); // Output: 25
    </script>

</body>

</html>
