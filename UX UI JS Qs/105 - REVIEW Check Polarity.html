<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check negativity and positivity of two integer</title>

    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        body {
            background-color: #f0f0f0;
            color: #090330;
            font-family: monospace;
            margin-top: 20px;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 40px;
        }

        .innerContainer {
            border: 2px solid #090330;
            border-radius: 8px;
            box-shadow: 0 0 8px;
        }
    </style>
</head>

<body>

    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Check negativity and positivity of two integer</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <div class="num_one_group">
                        <label for="num1">Number 1:</label>
                        <input type="number" id="num1" name="num1">
                    </div>
                    <div class="num_two_group">
                        <label for="num2">Number 2:</label>
                        <input type="number" id="num2" name="num2">
                    </div>
                </div>
                <button id="btn_checker">Check Polarity</button>
            </main>

            <div class="outputContainer">
                <h2>Result:</h2>
                <p id="result"></p>
            </div>
        </div>
    </div>


    <script>
        document.getElementById("btn_checker").addEventListener("click", () => {
            const num1 = parseFloat(document.getElementById("num1").value);
            const num2 = parseFloat(document.getElementById("num2").value);
            const result = check_polarity(num1, num2);

            document.getElementById("result").textContent = result;
        })

        function check_polarity(num1, num2) {
            if (num1 < 0 && num2 < 0) {
                return "Both numbers are negative";

            } else if (num1 >= 0 && num2 >= 0) {
                return "Both numbers are positive";

            } else if (num1 < 0 && num2 >= 0) {
                return "First number is negative and second number is positive";

            } else {
                return "First number is positive and second number is negative";
            }
        }

        // Example usage:
        // console.log(check_polarity(-5, -10)); // Both numbers are negative
        // console.log(check_polarity(5, 10));   // Both numbers are positive
        // console.log(check_polarity(-5, 10));  // First number is negative and second number is positive
        // console.log(check_polarity(5, -10));  // First number is positive
    </script>

</body>

</html>
