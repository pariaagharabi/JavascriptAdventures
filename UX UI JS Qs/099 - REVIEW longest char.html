<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest char</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Longest Character</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label for="input">Enter a string:</label>
                    <input type="text" id="userInput" name="input" placeholder="Type something...">
                </div>
            </main>

            <div class="output">
                <h1>Result:</h1>
                <span id="result"></span>
            </div>
        </div>
    </div>

    <script>
        function findLongestWord(str) {
            // Split the original string into an array of words
            const words = str.split(' ');

            // Start by assuming the first word is the longest
            let longestWord = words[0];

            // Loop through the rest of the words
            for (let i = 1; i < words.length; i++) {
                if (words[i].length > longestWord.length) {
                    longestWord = words[i];
                }
            }

            return longestWord;
        }


        // Example usage:
        console.log(findLongestWord("JavaScript is the web programming language")); // Output: programming

    </script>
</body>

</html>
