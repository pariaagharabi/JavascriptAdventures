<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longest char</title>
    <style>

    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Longest Character</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label for="input">Enter a string:</label>
                    <input type="text" id="userInput" name="input" placeholder="Type something...">
                </div>
            </main>
        </div>
    </div>

    <script>
        function longestChar(orgStr) {
            let longestChar = orgStr[0];

            for (let i = 1; i < orgStr.length; i++) {
                if (orgStr[i].length > longestChar.length) {
                    longestChar = orgStr[i];
                }
            }

            return longestChar;
        }

        // Example usage:
        console.log(longestChar("JavaScript is the web programming language")); // Output: JavaScript

    </script>
</body>

</html>
