<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVIEW Factorial of given number</title>
    <style>
        :is(*, *::before, *::after) {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background-color: azure;
            color: rgb(26, 29, 29);
            margin-top: 12px;
        }

        .appContainer {
            display: flex;
            justify-content: center;
            line-height: 60px;
        }

        .innerContainer {
            border: 2px solid rgb(26, 29, 29);
            border-radius: 8px;
            box-shadow: 0 0 8px;
            text-align: center;
            margin: 12px;
            padding: 12px;
        }

        .mainContainer .inputGroup label::after {
            content: "*";
        }
    </style>
</head>

<body>
    <div class="appContainer">
        <div class="innerContainer">
            <header class="headerContainer">
                <h1>Factorial of given number</h1>
            </header>

            <main class="mainContainer">
                <div class="inputGroup">
                    <label>Number:</label>
                    <input type="number" id="numInput" placeholder="Enter a number">
                </div>
                <button id="btnFact">Calculate Factorial</button>
            </main>

            <div class="outputContainer">
                <h2>Result:</h2>
                <p id="result"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("btnFact").addEventListener("click", () => {
            const userInputNum = parseInt(document.getElementById("numInput").value);

            if (isNaN(userInputNum) || userInputNum < 0) {
                document.getElementById("result").textContent = "Please enter a valid non-negative integer.";
                return;
            }

            document.getElementById("result").textContent = getFactorial(userInputNum);
        })

        function getFactorial(orgNum) {
            let factorial = 1;
            for (let i = 1; i <= orgNum; i++) {
                factorial *= i;
            }
            return factorial;
        }

        // Example usage:
        console.log(getFactorial(5)); // Output: 120

    </script>

</body>

</html>
